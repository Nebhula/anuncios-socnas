<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📖 ReadLater - Guardar Links</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      min-height: 100vh;
      padding: 20px;
      color: #e2e8f0;
    }
    .container { max-width: 800px; margin: 0 auto; }
    
    .header {
      text-align: center;
      padding: 40px 20px;
      background: linear-gradient(135deg, #1e293b 0%, #334155 100%);
      border-radius: 16px;
      margin-bottom: 25px;
      border: 1px solid #475569;
    }
    .header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }
    .header p { color: #94a3b8; font-size: 14px; }
    
    .form-box {
      background: #1e293b;
      padding: 25px;
      border-radius: 16px;
      margin-bottom: 25px;
      border: 1px solid #475569;
    }
    .form-box h3 {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 15px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .form-box h3 i { color: #60a5fa; }
    
    .form-row { display: flex; gap: 10px; margin-bottom: 15px; }
    .form-row input {
      flex: 1;
      padding: 12px 16px;
      background: #0f172a;
      border: 1px solid #475569;
      border-radius: 10px;
      font-size: 14px;
      color: #f1f5f9;
    }
    .form-row input:focus { outline: none; border-color: #60a5fa; }
    
    .btn-submit {
      width: 100%;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      color: white;
      border: none;
      padding: 14px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-submit:hover { opacity: 0.9; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .loading {
      display: none;
      text-align: center;
      padding: 15px;
      margin-top: 15px;
      background: rgba(96, 165, 250, 0.1);
      border-radius: 10px;
      border: 1px solid rgba(96, 165, 250, 0.3);
    }
    .loading.active { display: block; }
    .spinner {
      width: 30px; height: 30px;
      border: 3px solid #475569;
      border-top-color: #60a5fa;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .alert {
      padding: 12px 16px;
      border-radius: 10px;
      margin-bottom: 15px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .alert-success { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
    .alert-error { background: rgba(239, 68, 68, 0.15); color: #f87171; }
    .hidden { display: none; }
    
    .tabs { display: flex; gap: 8px; margin-bottom: 15px; }
    .tab-btn {
      background: #1e293b;
      border: 1px solid #475569;
      color: #94a3b8;
      padding: 8px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
    }
    .tab-btn.active { background: #60a5fa; border-color: #60a5fa; color: white; }
    
    .article-list { display: grid; gap: 12px; }
    
    .article-card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      border: 1px solid #475569;
      display: grid;
      grid-template-columns: 60px 1fr auto;
      gap: 15px;
      align-items: center;
    }
    .article-card:hover { border-color: #60a5fa; }
    .article-card.read { opacity: 0.6; }
    
    .article-img {
      width: 60px; height: 60px;
      object-fit: cover;
      border-radius: 8px;
      background: #0f172a;
    }
    
    .article-info h4 {
      color: #f1f5f9;
      font-size: 15px;
      margin-bottom: 6px;
      font-weight: 600;
    }
    .article-meta {
      display: flex;
      gap: 12px;
      font-size: 12px;
      color: #94a3b8;
    }
    
    .article-actions { display: flex; flex-direction: column; gap: 8px; }
    
    .btn-read {
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      color: white;
      text-decoration: none;
      padding: 8px 16px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 13px;
      text-align: center;
    }
    
    .btn-delete {
      background: #0f172a;
      border: 1px solid #475569;
      color: #94a3b8;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-delete:hover { background: #ef4444; border-color: #ef4444; color: white; }
    
    .btn-mark {
      background: #0f172a;
      border: 1px solid #475569;
      color: #94a3b8;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 12px;
    }
    .btn-mark:hover { background: #22c55e; border-color: #22c55e; color: white; }
    
    /* MODO LECTURA */
    .reading-modal {
      display: none;
      position: fixed;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: #0f172a;
      z-index: 1000;
      overflow-y: auto;
    }
    .reading-modal.active { display: flex; }
    
    .reading-content {
      max-width: 650px;
      margin: 0 auto;
      padding: 30px 20px;
      width: 100%;
    }
    
    .reading-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 25px;
      padding-bottom: 15px;
      border-bottom: 1px solid #475569;
    }
    
    .reading-controls { display: flex; gap: 8px; }
    
    .control-btn {
      background: #1e293b;
      border: 1px solid #475569;
      color: #94a3b8;
      padding: 6px 10px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .control-btn:hover { background: #60a5fa; color: white; }
    
    .btn-close {
      background: #ef4444;
      border: none;
      color: white;
      padding: 6px 14px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      font-size: 13px;
    }
    
    .reading-title {
      font-size: 24px;
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 8px;
      line-height: 1.3;
    }
    
    .reading-meta {
      color: #94a3b8;
      font-size: 13px;
      margin-bottom: 25px;
    }
    .reading-meta a { color: #60a5fa; }
    
    .reading-body {
      font-size: 17px;
      line-height: 1.7;
      color: #e2e8f0;
    }
    .reading-body p { margin-bottom: 18px; }
    .reading-body img { max-width: 100%; border-radius: 12px; margin: 15px 0; }
    
    .empty-state {
      text-align: center;
      padding: 50px 20px;
      background: #1e293b;
      border-radius: 16px;
      border: 1px solid #475569;
    }
    .empty-state i { font-size: 48px; color: #475569; margin-bottom: 15px; }
    .empty-state h3 { color: #f1f5f9; margin-bottom: 8px; font-size: 18px; }
    .empty-state p { color: #94a3b8; font-size: 14px; }
    
    .footer {
      text-align: center;
      padding: 25px;
      color: #64748b;
      font-size: 12px;
      margin-top: 30px;
      border-top: 1px solid #475569;
    }
    
    @media (max-width: 600px) {
      .form-row { flex-direction: column; }
      .article-card { grid-template-columns: 1fr; }
      .article-img { width: 100%; height: 120px; }
    }
  </style>
</head>
<body>
  <div class="container">
    
    <div class="header">
      <h1><i class="fa-solid fa-book-open"></i> ReadLater</h1>
      <p>Guarda artículos de cualquier URL. Lee sin distracciones.</p>
    </div>

    <div id="alertBox" class="alert hidden"></div>

    <div class="form-box">
      <h3><i class="fa-solid fa-plus-circle"></i> Guardar Nuevo Artículo</h3>
      
      <div class="form-row">
        <input type="url" id="articleUrl" placeholder="Pega la URL del artículo...">
      </div>
      
      <button class="btn-submit" id="submitBtn" onclick="saveArticle()">
        <i class="fa-solid fa-bookmark"></i>
        <span>Extraer y Guardar</span>
      </button>
      
      <div class="loading" id="loading">
        <div class="spinner"></div>
        <p>Extrayendo contenido...</p>
      </div>
    </div>

    <div class="tabs">
      <button class="tab-btn active" onclick="filterArticles('all')">📚 Todos</button>
      <button class="tab-btn" onclick="filterArticles('unread')">📖 Por Leer</button>
      <button class="tab-btn" onclick="filterArticles('read')">✅ Leídos</button>
    </div>

    <div class="article-list" id="articleList"></div>

    <div class="footer">
      <p><i class="fa-solid fa-bolt"></i> Contenido extraído con microlink.io</p>
    </div>

  </div>

  <!-- MODO LECTURA -->
  <div class="reading-modal" id="readingModal">
    <div class="reading-content">
      <div class="reading-header">
        <button class="btn-close" onclick="closeReading()">← Volver</button>
        <div class="reading-controls">
          <button class="control-btn" onclick="changeFontSize(-1)">A-</button>
          <button class="control-btn" onclick="changeFontSize(1)">A+</button>
          <button class="control-btn" onclick="toggleTheme()">🌙</button>
        </div>
      </div>
      
      <h1 class="reading-title" id="readingTitle"></h1>
      <div class="reading-meta" id="readingMeta"></div>
      <div class="reading-body" id="readingBody"></div>
    </div>
  </div>

  <script>
    // Cargar artículos desde localStorage
    let articles = [];
    try {
      const saved = localStorage.getItem('readLaterArticles');
      if (saved) articles = JSON.parse(saved);
    } catch(e) {}

    let currentFontSize = 17;
    let isDarkTheme = true;

    // Guardar en localStorage
    function saveToStorage() {
      try {
        localStorage.setItem('readLaterArticles', JSON.stringify(articles));
      } catch(e) {}
    }

    // Actualizar contador
    function updateStats() {
      const total = articles.length;
      const read = articles.filter(a => a.status === 'read').length;
      document.title = `📖 ReadLater (${total})`;
    }

    // Cargar al inicio
    window.onload = function() { 
      renderArticles('all'); 
      updateStats(); 
    };

    // Renderizar lista de artículos
    function renderArticles(filter) {
      const container = document.getElementById('articleList');
      
      let filtered = articles;
      if (filter === 'unread') filtered = articles.filter(a => a.status === 'unread');
      if (filter === 'read') filtered = articles.filter(a => a.status === 'read');
      
      if (filtered.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <i class="fa-regular fa-folder-open"></i>
            <h3>No hay artículos</h3>
            <p>${filter === 'unread' ? '¡Todos leídos!' : 'Guarda tu primer artículo'}</p>
          </div>
        `;
        return;
      }

      container.innerHTML = '';

      filtered.forEach(article => {
        const card = document.createElement('div');
        card.className = 'article-card' + (article.status === 'read' ? ' read' : '');
        
        card.innerHTML = `
          <img src="${article.image || 'https://via.placeholder.com/60'}" alt="" class="article-img" onerror="this.src='https://via.placeholder.com/60'">
          
          <div class="article-info">
            <h4>${article.title}</h4>
            <div class="article-meta">
              <span><i class="fa-regular fa-clock"></i> ${article.readTime} min</span>
              <span><i class="fa-regular fa-calendar"></i> ${article.savedAt}</span>
              ${article.status === 'read' ? `<span><i class="fa-solid fa-check"></i> Leído</span>` : ''}
            </div>
            <p style="color: #64748b; font-size: 11px; margin-top: 4px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">${article.url}</p>
          </div>
          
          <div class="article-actions">
            ${article.status === 'unread' ? `<a href="#" class="btn-read" onclick="openReading(${article.id})">Leer</a>` : ''}
            <button class="btn-mark" onclick="toggleRead(${article.id})">
              ${article.status === 'read' ? '🔄 No leído' : '✅ Leído'}
            </button>
            <button class="btn-delete" onclick="deleteArticle(${article.id})">🗑️ Eliminar</button>
          </div>
        `;
        
        container.appendChild(card);
      });
    }

    // === GUARDAR ARTÍCULO CON EXTRACCIÓN REAL ===
    async function saveArticle() {
      const url = document.getElementById('articleUrl').value.trim();
      const submitBtn = document.getElementById('submitBtn');
      const loading = document.getElementById('loading');

      if (!url) {
        showAlert('⚠️ Introduce una URL válida', 'error');
        return;
      }

      submitBtn.disabled = true;
      loading.classList.add('active');

      try {
        // === LLAMADA A MICROLINK.IO API ===
        const apiUrl = 'https://api.microlink.io/?url=' + encodeURIComponent(url) + '&meta=true';
        const response = await fetch(apiUrl);
        const data = await response.json();
        
        let title, description, image;
        
        if (data.status === 'success') {
          title = data.data.title || 'Artículo sin título';
          description = data.data.description || 'Sin descripción disponible';
          image = data.data.image ? (data.data.image.url || data.data.image) : '';
        } else {
          title = 'Artículo de ' + new URL(url).hostname;
          description = 'Contenido extraído de ' + url;
          image = '';
        }
        
        const newArticle = {
          id: Date.now(),
          title: title,
          url: url,
          image: image,
          readTime: Math.max(1, Math.floor(description.length / 200)),
          status: "unread",
          content: description,
          savedAt: new Date().toISOString().split('T')[0],
          readAt: null
        };

        articles.unshift(newArticle);
        saveToStorage();
        renderArticles('all');
        updateStats();

        document.getElementById('articleUrl').value = '';
        showAlert('✅ Artículo guardado: ' + title.substring(0, 40) + '...', 'success');
        
      } catch (error) {
        console.error('Error:', error);
        showAlert('❌ Error: ' + error.message, 'error');
      }

      loading.classList.remove('active');
      submitBtn.disabled = false;
    }

    // Marcar como leído/no leído
    function toggleRead(id) {
      const article = articles.find(a => a.id === id);
      if (article) {
        article.status = article.status === 'read' ? 'unread' : 'read';
        article.readAt = article.status === 'read' ? new Date().toISOString().split('T')[0] : null;
        saveToStorage();
        renderArticles('all');
        updateStats();
      }
    }

    // Eliminar artículo
    function deleteArticle(id) {
      articles = articles.filter(a => a.id !== id);
      saveToStorage();
      renderArticles('all');
      updateStats();
      showAlert('🗑️ Eliminado', 'success');
    }

    // Filtrar artículos
    function filterArticles(filter) {
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      event.target.classList.add('active');
      renderArticles(filter);
    }

    // Abrir modo lectura
    function openReading(id) {
      const article = articles.find(a => a.id === id);
      if (article) {
        document.getElementById('readingTitle').textContent = article.title;
        document.getElementById('readingMeta').innerHTML = `${article.readTime} min · <a href="${article.url}" target="_blank">Ver original →</a>`;
        document.getElementById('readingBody').innerHTML = `<p>${article.content}</p><p style="margin-top:25px;padding-top:15px;border-top:1px solid #475569;"><a href="${article.url}" target="_blank" style="color: #60a5fa;">🔗 Leer completo en el sitio original</a></p>`;
        document.getElementById('readingModal').classList.add('active');
        
        article.status = 'read';
        article.readAt = new Date().toISOString().split('T')[0];
        saveToStorage();
        updateStats();
      }
    }

    // Cerrar modo lectura
    function closeReading() {
      document.getElementById('readingModal').classList.remove('active');
      renderArticles('all');
    }

    // Cambiar tamaño de fuente
    function changeFontSize(delta) {
      currentFontSize += delta;
      if (currentFontSize < 14) currentFontSize = 14;
      if (currentFontSize > 24) currentFontSize = 24;
      document.getElementById('readingBody').style.fontSize = currentFontSize + 'px';
    }

    // Cambiar tema claro/oscuro
    function toggleTheme() {
      isDarkTheme = !isDarkTheme;
      const modal = document.getElementById('readingModal');
      const body = document.getElementById('readingBody');
      
      if (isDarkTheme) {
        modal.style.background = '#0f172a';
        body.style.color = '#e2e8f0';
      } else {
        modal.style.background = '#ffffff';
        body.style.color = '#1e293b';
      }
    }

    // Mostrar alerta
    function showAlert(msg, type) {
      const box = document.getElementById('alertBox');
      box.textContent = msg;
      box.className = 'alert alert-' + type;
      box.classList.remove('hidden');
      setTimeout(() => box.classList.add('hidden'), 4000);
    }
  </script>
</body>
</html>
